<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RideStrong Workouts</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>RideStrong Workouts</h1>
    <div id="exercise-list">
    </div>
    <button id="add-exercise-btn">Add Exercise</button>
    <dialog id="add-exercise-dialog">
        <form method="dialog" id="add-exercise-form">
            <label for="exercise-name">Exercise Name:</label>
            <input type="text" id="exercise-name" name="exercise-name" required>
            <br>
            <label for="exercise-muscle">Muscle Group:</label>
            <input type="text" id="exercise-muscle" name="exercise-muscle" required>
            <br>
            <label for="exercise-reps">Reps:</label>
            <input type="number" id="exercise-reps" name="exercise-reps" required>
            <br>
            <button type="submit">Add Exercise</button>
            <button type="button" id="cancel-btn">Cancel</button>
        </form>
    </dialog>   
    <script src="app.js"></script>
</body>
</html>
